<!-- templates/create_request.html -->
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Create Request</title>

  <!-- CSS file -->
  <script src="https://cdn.jsdelivr.net/npm/ag-grid-community/dist/ag-grid-community.min.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/create_request.css') }}">
</head>
<body>
  <div class="shell mb-3">
    <h1>Create Request</h1>

    <div class="container">
        <div class="row mb-3">

            <!-- Job Title Column -->
            <div class="col">
                <label for="jobTitle">Select Job Title</label>
                <select id="jobTitle" class="form-control">
                    <option value="" disabled selected>Select a job title</option>
                    {%- for jt in job_titles %}
                    <option value="{{ jt['ID'] }}">{{ jt['ID'] }}: {{ jt['En_Name'] }}</option>
                    {%- endfor %}
                </select>
            </div>

            <!-- Gender Column -->
            <div class="col">
                <label for="gender">Gender</label>
                <select id="gender" class="form-control">
                    <option value="Any" selected>Any</option>
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                </select>
            </div>

            <!-- Number of Applicants Column -->
            <div class="col">
                <label for="numApplicants">Number of Applicants</label>
                <input type="number" id="numApplicants" class="form-control" min="1" value="1" />
            </div>

            <!-- Needed By Date Column -->
            <div class="col">
                <label for="neededBy">Needed By</label>
                <input type="date" id="neededBy" class="form-control" />
            </div>

        </div>
    </div>

    <div class="row mb-3">
      <button id="submitButton">Submit</button>
    </div>

    <div class="row">
        <!-- Tabs Navigation -->
        <ul class="nav nav-tabs mb-3" id="gridTabs" role="tablist">
            <li class="nav-item" role="presentation">
                <button class="nav-link active" id="request-tab" data-bs-toggle="tab" data-bs-target="#requestTabPane" type="button" role="tab" aria-controls="requestTabPane" aria-selected="true">
                Request Grid
                </button>
            </li>

            <li class="nav-item" role="presentation">
                <button class="nav-link" id="jobtitle-request-tab" data-bs-toggle="tab" data-bs-target="#jobTitleRequestTabPane" type="button" role="tab" aria-controls="jobTitleRequestTabPane" aria-selected="false">
                JobTitle_Request Grid
                </button>
            </li>
        </ul>

        <!-- Tab Content -->
        <div class="tab-content" id="gridTabsContent">

            <!-- Request Grid Tab -->
            <div class="tab-pane fade show active" id="requestTabPane" role="tabpanel" aria-labelledby="request-tab">
                <div class="row">
                <div id="requestGrid" class="ag-theme-alpine" style="height: 400px;"></div>
                </div>
            </div>

            <!-- JobTitle_Request Grid Tab -->
            <div class="tab-pane fade" id="jobTitleRequestTabPane" role="tabpanel" aria-labelledby="jobtitle-request-tab">
                <div class="row">
                <div id="jobTitleRequestGrid" class="ag-theme-alpine" style="height: 400px;"></div>
                </div>
            </div>

        </div>
    </div>
  </div>

  <!-- JS file -->
  <script src="{{ url_for('static', filename='js/create_request.js') }}"></script>
  <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js" integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y" crossorigin="anonymous"></script>
</body>
</html>
